apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-platform-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-platform-api
  template:
    metadata:
      labels:
        app: ai-platform-api
    spec:
      containers:
        - name: api
          image: ai-platform-production-stack:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secrets
                  key: OPENAI_API_KEY
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow.default.svc.cluster.local:5000
